</head>
<body class="selection:bg-blue-500">

    <div class="fixed inset-0 hero-gradient opacity-20 -z-10"></div>

    <nav class="sticky top-0 z-50 glass border-b border-white/10 px-6 py-4">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <img src="https://i.ibb.co/Jw470S85/610-Zxgk-I0n-L.png" class="w-10 h-10 rounded-xl shadow-lg shadow-blue-500/20" alt="Logo">
                <h1 class="text-2xl font-extrabold tracking-tight uppercase">Walko<span class="text-blue-500">Wallpaper</span></h1>

    <div class="sticky top-[73px] z-40 glass border-b border-white/5 py-3 overflow-x-auto no-scrollbar">
        <div class="container mx-auto px-4 flex space-x-3 items-center">
            <button onclick="filterCategory('all', this)" class="cat-btn active px-6 py-2 rounded-full text-sm font-bold uppercase tracking-wider">All</button>
            <button onclick="filterCategory('Car', this)" class="cat-btn px-6 py-2 rounded-full text-sm font-bold bg-white/5 uppercase tracking-wider">Car</button>
            <button onclick="filterCategory('Game', this)" class="cat-btn px-6 py-2 rounded-full text-sm font-bold bg-white/5 uppercase tracking-wider">Game</button>
            <button onclick="filterCategory('Dark', this)" class="cat-btn px-6 py-2 rounded-full text-sm font-bold bg-white/5 uppercase tracking-wider">Dark</button>
            <button onclick="filterCategory('Love', this)" class="cat-btn px-6 py-2 rounded-full text-sm font-bold bg-white/5 uppercase tracking-wider">Love</button>
            <button onclick="filterCategory('Anime', this)" class="cat-btn px-6 py-2 rounded-full text-sm font-bold bg-white/5 uppercase tracking-wider">Anime</button>
            <button onclick="filterCategory('Sanatan', this)" class="cat-btn px-6 py-2 rounded-full text-sm font-bold bg-white/5 uppercase tracking-wider">Sanatan</button>
            <button onclick="filterCategory('Others', this)" class="cat-btn px-6 py-2 rounded-full text-sm font-bold bg-white/5 uppercase tracking-wider">Others</button>
        </div>
    </div>

    <div class="container mx-auto px-4 mt-8 flex justify-center">
        <div class="w-full max-w-5xl bg-gray-800/30 rounded-2xl p-2 border border-white/5 overflow-hidden">
            <script async="async" data-cfasync="false" src="https://pl29073043.profitablecpmratenetwork.com/82f1ac5d3abbf01df99705b56fb92f77/invoke.js"></script>
            <div id="container-82f1ac5d3abbf01df99705b56fb92f77"></div>
        </div>
    </div>

    <section class="container mx-auto px-4 py-12">
        <div class="mb-12 text-center">
            <h2 class="text-4xl md:text-5xl font-extrabold mb-4 uppercase tracking-tighter">Premium <span id="category-title" class="text-blue-400">Collections</span></h2>
            <p class="text-gray-400 max-w-2xl mx-auto italic">Quality wallpapers by Infinite Studio.</p>
        </div>

        <div id="wallpaper-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
            <div class="animate-pulse bg-white/5 rounded-3xl h-80"></div>
            <div class="animate-pulse bg-white/5 rounded-3xl h-80"></div>
            <div class="animate-pulse bg-white/5 rounded-3xl h-80"></div>
            <div class="animate-pulse bg-white/5 rounded-3xl h-80"></div>
        </div>
    </section>

    <div class="container mx-auto px-4 my-8 flex justify-center">
        <div class="w-full max-w-4xl bg-gray-800/30 rounded-2xl p-2 border border-white/5 overflow-hidden">
             <div id="container-82f1ac5d3abbf01df99705b56fb92f77-duplicate"></div>
        </div>
    </div>

    <footer class="glass mt-20 border-t border-white/10 py-10 text-center">
        <div class="text-gray-500 text-sm">
            Developed by <span class="text-blue-400 font-semibold">Jack-Tech</span> from <span class="text-purple-400 font-semibold">Infinite Studio</span>
        </div>
        <p class="mt-4 text-xs text-gray-600 uppercase tracking-widest">&copy; 2026 Walko Wallpaper</p>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDICTyfZYjtmkn1Jll8DAXavnIUCvWC5gM",
            authDomain: "infinite-apk-studio.firebaseapp.com",
            projectId: "infinite-apk-studio",
            storageBucket: "infinite-apk-studio.firebasestorage.app",
            messagingSenderId: "1061676347878",
            appId: "1:1061676347878:web:1a09cb4c9807b842d16627"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const grid = document.getElementById('wallpaper-grid');
        let allWallpapers = [];

        const adsterraDirectLink = "https://www.profitablecpmratenetwork.com/eiwbrpusi?key=dff4e2499ce8e269ce3b52ea1dfe01ea";

        onSnapshot(collection(db, "wallpapers"), (snapshot) => {
            allWallpapers = [];
            snapshot.forEach(doc => allWallpapers.push({id: doc.id, ...doc.data()}));
            renderWallpapers('all');
        });

        window.filterCategory = function(category, btn) {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active', 'bg-blue-600'));
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.add('bg-white/5'));
            btn.classList.add('active');
            btn.classList.remove('bg-white/5');
            document.getElementById('category-title').innerText = category === 'all' ? 'Collections' : category;
            renderWallpapers(category);
        };

        function renderWallpapers(category) {
            grid.innerHTML = '';
            const filtered = category === 'all' ? allWallpapers : allWallpapers.filter(w => w.category === category);
            if (filtered.length === 0) {
                grid.innerHTML = '<div class="col-span-full text-center text-gray-500 py-20 tracking-widest uppercase">No Wallpapers found in this category</div>';
                return;
            }
            filtered.forEach((data) => {
                const card = `
                    <div class="wallpaper-card relative group bg-gray-800/50 rounded-[2rem] overflow-hidden shadow-2xl border border-white/5">
                        <img src="${data.url}" class="w-full h-[400px] object-cover transition-transform duration-700 group-hover:scale-110" loading="lazy">
                        <div class="absolute inset-0 bg-gradient-to-t from-black via-transparent opacity-0 group-hover:opacity-100 transition-all duration-300 p-6 flex flex-col justify-end">
                            <span class="text-blue-400 text-[10px] font-bold uppercase tracking-widest mb-1">${data.category || 'All'}</span>
                            <h4 class="text-lg font-bold mb-4 uppercase tracking-tighter">${data.title || 'Premium Wall'}</h4>
                            <div class="flex gap-2">
                                <button onclick="handleAction('${data.url}', 'preview')" class="flex-1 bg-white text-black py-3 rounded-2xl font-bold text-center text-xs hover:bg-blue-500 hover:text-white transition-colors uppercase">
                                    <i class="fas fa-expand mr-2"></i> Preview
                                </button>
                                <button onclick="handleAction('${data.url}', 'download')" class="w-14 bg-blue-600 text-white flex items-center justify-center rounded-2xl hover:bg-blue-700 transition-colors">
                                    <i class="fas fa-arrow-down"></i>
                                </button>
                            </div>
                        </div>
                    </div>`;
                grid.innerHTML += card;
            });
        }

        window.handleAction = function(url, type) {
            window.open(adsterraDirectLink, '_blank');
            if(type === 'preview') {
                window.open(url, '_blank');
            } else {
                const link = document.createElement('a');
                link.href = url;
                link.download = 'walko-wallpaper.jpg';
                link.target = '_blank';
                link.click();
            }
        };
    </script>
    <script src="https://pl29081860.profitablecpmratenetwork.com/7c/42/78/7c427805a60fb7f452506a0d456d11a6.js"></script>
</body>
