<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Walko Wallpaper | Jack Tech</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0f172a; color: white; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .hero-gradient { background: radial-gradient(circle at top right, #1e40af, transparent), radial-gradient(circle at bottom left, #7e22ce, transparent); }
        .wallpaper-card { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="selection:bg-blue-500">

    <div class="fixed inset-0 hero-gradient opacity-20 -z-10"></div>

    <nav class="sticky top-0 z-50 glass border-b border-white/10 px-6 py-4">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <div class="w-10 h-10 bg-gradient-to-tr from-blue-600 to-purple-600 rounded-xl flex items-center justify-center shadow-lg shadow-blue-500/20">
                    <i class="fas fa-image text-white"></i>
                </div>
                <h1 class="text-2xl font-extrabold tracking-tight uppercase">Walko<span class="text-blue-500">Wallpaper</span></h1>
            </div>
        </div>
    </nav>

    <section class="container mx-auto px-4 py-12">
        <div class="mb-12 text-center">
            <h2 class="text-4xl md:text-5xl font-extrabold mb-4 uppercase">Premium <span class="text-blue-400">Walls</span></h2>
            <p class="text-gray-400 max-w-2xl mx-auto">High-quality wallpapers handpicked by Infinite Studio.</p>
        </div>

        <div id="wallpaper-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
            <div class="animate-pulse bg-white/5 rounded-3xl h-80"></div>
            <div class="animate-pulse bg-white/5 rounded-3xl h-80"></div>
        </div>
    </section>

    <footer class="glass mt-20 border-t border-white/10 py-10 text-center">
        <div class="text-gray-500 text-sm">
            Developed by <span class="text-blue-400 font-semibold">Jack-Tech</span> from <span class="text-purple-400 font-semibold">Infinite Studio</span>
        </div>
        <p class="mt-4 text-xs text-gray-600">&copy; 2026 All Rights Reserved.</p>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Firebase Config Yahan Dalein
        const firebaseConfig = {
  apiKey: "AIzaSyDICTyfZYjtmkn1Jll8DAXavnIUCvWC5gM",
  authDomain: "infinite-apk-studio.firebaseapp.com",
  projectId: "infinite-apk-studio",
  storageBucket: "infinite-apk-studio.firebasestorage.app",
  messagingSenderId: "1061676347878",
  appId: "1:1061676347878:web:1a09cb4c9807b842d16627"
};

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const grid = document.getElementById('wallpaper-grid');

        // Ad Link
        const AD_URL = "https://www.profitablecpmratenetwork.com/kfjeguc0?key=5cf3e43262795c1e8c9c1454b9fb9cb6";

        window.handleAd = (imageUrl) => {
            window.open(AD_URL, '_blank'); // Ad khulega
            window.open(imageUrl, '_blank'); // Asli image khulegi
        };

        onSnapshot(collection(db, "wallpapers"), (snapshot) => {
            grid.innerHTML = '';
            snapshot.forEach((doc) => {
                const data = doc.data();
                const card = `
                    <div class="wallpaper-card relative group bg-gray-800 rounded-3xl overflow-hidden shadow-2xl">
                        <img src="${data.url}" class="w-full h-[380px] object-cover transition-transform duration-700 group-hover:scale-110">
                        <div class="absolute inset-0 bg-gradient-to-t from-black/90 via-transparent opacity-0 group-hover:opacity-100 transition-all p-6 flex flex-col justify-end">
                            <h4 class="text-lg font-bold mb-4 uppercase tracking-tight">${data.title}</h4>
                            <div class="flex gap-2">
                                <button onclick="handleAd('${data.url}')" class="flex-1 bg-white text-black py-3 rounded-xl font-bold text-sm hover:bg-blue-400 transition">
                                    <i class="fas fa-download mr-2"></i> Download
                                </button>
                            </div>
                        </div>
                    </div>`;
                grid.innerHTML += card;
            });
        });
    </script>
</body>
</html>
